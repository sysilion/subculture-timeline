name: Auto-update Banner & Event Schedule

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 UTC 00:00 (KST 09:00)
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: write
  actions: write   # deploy.yml workflow_dispatch 트리거에 필요

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Set up Node.js (paimon.moe JS 파싱용)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit if changed
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update banner/event schedule"
          file_pattern: "data/games.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      # GITHUB_TOKEN 푸시는 push 이벤트 워크플로우를 트리거하지 않으므로 명시적으로 배포 실행
      - name: Trigger Pages deploy if data changed
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

