<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서브컬쳐 게임 타임라인</title>
  <meta name="description" content="원신·스타레일·명조·젠레스·엔드필드·이환·몬길 등 서브컬쳐 게임 배너·이벤트 일정을 한눈에 비교하는 타임라인 사이트" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- ── 헤더 ── -->
  <header id="header">
    <h1>
      🎮 <span data-i18n="siteTitle">서브컬쳐 게임 타임라인</span>
      <span data-i18n="siteSubtitle">뽑기 배너 · 이벤트 · 버전 일정 통합</span>
    </h1>

    <!-- 범례 -->
    <div id="legend">
      <div class="legend-item">
        <div class="legend-dot type-banner"></div><span data-i18n="legendBanner">뽑기 배너</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot type-event"></div><span data-i18n="legendEvent">이벤트</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot type-version"></div><span data-i18n="legendVersion">버전 기간</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot tentative"></div><span data-i18n="legendTentative">미확정</span>
      </div>
      <div class="legend-item" style="margin-left:4px;">
        <div style="width:2px;height:14px;background:#f44336;border-radius:1px;"></div>
        <span style="margin-left:4px;" data-i18n="legendToday">오늘</span>
      </div>
    </div>

    <!-- 날짜 범위 -->
    <div id="range-controls">
      <label for="range-select" data-i18n="rangeLabel">표시 범위:</label>
      <select id="range-select">
        <option value="14,45">-14일 ~ +45일</option>
        <option value="30,60" selected>-30일 ~ +60일</option>
        <option value="60,90">-60일 ~ +90일</option>
        <option value="90,120">-90일 ~ +120일</option>
      </select>
    </div>

    <!-- 언어 전환 -->
    <div id="lang-switcher">
      <button class="lang-btn active" data-lang="ko">한국어</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <div id="last-updated">로딩 중...</div>
  </header>

  <!-- ── 게임 필터 및 검색 ── -->
  <div id="filter-bar">
    <span class="filter-label" data-i18n="filterLabel">게임 표시:</span>
    <button id="filter-all" class="filter-bulk-btn" data-i18n="showAll">전체</button>
    <button id="filter-none" class="filter-bulk-btn" data-i18n="hideAll">해제</button>
    <div id="search-container">
      <input type="text" id="game-search" placeholder="게임 검색..." data-i18n-placeholder="searchPlaceholder" aria-label="게임 검색">
      <button id="clear-search" aria-label="검색 초기화">&times;</button>
    </div>
  </div>

  <!-- ── 타임라인 및 뷰 전환 버튼 ── -->
  <div id="timeline-wrapper">
    <div id="view-toggle">
      <button id="gantt-view" class="view-btn active" aria-label="간트 차트 뷰로 전환 (활성화됨)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"/>
          <line x1="7" y1="3" x2="7" y2="21" stroke-width="2"/>
          <line x1="12" y1="3" x2="12" y2="21" stroke-width="2"/>
          <line x1="17" y1="3" x2="17" y2="21" stroke-width="2"/>
        </svg>
      </button>
      <button id="list-view" class="view-btn" aria-label="리스트 뷰로 전환">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6" stroke-width="2"/>
          <line x1="3" y1="12" x2="21" y2="12" stroke-width="2"/>
          <line x1="3" y1="18" x2="21" y2="18" stroke-width="2"/>
        </svg>
      </button>
      <button id="today-btn" data-i18n="todayBtn">오늘</button>
      <button id="ics-btn" data-i18n="icsBtn" title="표시 중인 게임의 예정/진행중 일정을 캘린더 파일로 저장">📅 .ics</button>
    </div>
    <!-- 로딩 스켈레톤 (데이터 로드 중 표시) -->
    <div id="skeleton-container">
      <div class="skeleton-row" style="--sk-left:0;width:100px;height:28px;border-radius:6px"></div>
      <div class="skeleton-row" style="--sk-left:120px;width:180px;height:28px;border-radius:6px"></div>
      <div class="skeleton-row" style="--sk-left:320px;width:120px;height:28px;border-radius:6px"></div>
      <div class="skeleton-row" style="--sk-left:460px;width:200px;height:28px;border-radius:6px"></div>
      <div class="skeleton-row" style="--sk-left:0;width:100px;height:28px;border-radius:6px;margin-top:8px"></div>
      <div class="skeleton-row" style="--sk-left:120px;width:140px;height:28px;border-radius:6px"></div>
      <div class="skeleton-row" style="--sk-left:280px;width:90px;height:28px;border-radius:6px"></div>
      <div class="skeleton-row" style="--sk-left:0;width:100px;height:28px;border-radius:6px;margin-top:8px"></div>
      <div class="skeleton-row" style="--sk-left:120px;width:220px;height:28px;border-radius:6px"></div>
    </div>
    <div id="timeline-scroll">
      <div id="timeline-canvas">
        <div id="ruler">
          <div id="ruler-spacer"></div>
          <div id="ruler-dates"></div>
        </div>
        <div id="game-rows"></div>
      </div>
    </div>
    <div id="list-scroll" hidden>
      <div id="list-container"></div>
    </div>
  </div>

  <!-- ── 푸터 ── -->
  <footer id="footer">
    <div>
      <span data-i18n="footerNote">배너 일정은 공식 발표 또는 커뮤니티 추적 기준이며, 미확정(⚠) 일정은 변동될 수 있습니다.</span>
      |
      <a href="https://paimon.moe/timeline" target="_blank">paimon.moe</a> ·
      <a href="https://wuwatracker.com/ko/timeline" target="_blank">wuwatracker</a> ·
      <a href="https://zzz.rng.moe/en/timeline" target="_blank">zzz.rng.moe</a> ·
      <a href="https://www.subgamecals.com/" target="_blank">subgamecals</a>
    </div>
    <div>
      <span data-i18n="footerDataSource">데이터 수정:</span> <code>data/games.json</code>
    </div>
  </footer>

</div>

<div id="tooltip"><div class="tooltip-inner"></div></div>

<!-- ── 게임 상세 패널 ── -->
<div id="detail-panel" class="detail-panel" role="dialog" aria-modal="true" aria-label="게임 상세">
  <div class="detail-panel-header">
    <div class="detail-panel-title"></div>
    <button class="detail-panel-close" id="detail-panel-close">&times;</button>
  </div>
  <div class="detail-panel-content" id="detail-panel-content"></div>
</div>
<div id="detail-overlay" class="detail-overlay"></div>

<!-- SortableJS (drag-to-reorder, CDN 의존 제거를 위해 로컬 번들) -->
<script src="js/vendor/Sortable.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/timeline.js"></script>
</body>
</html>
